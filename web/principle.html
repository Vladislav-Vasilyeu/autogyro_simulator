<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курсовой проект – Принцип работы</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="active_dialog.js" defer></script>
</head>
<body onLoad="dialog_window()">

<div class="fixed-header">
    <div class="nav-container">
        <div class="site-title">Автожир</div>
        <button class="burger-menu" onclick="toggleMenu()" aria-label="Открыть меню">
            <span></span><span></span><span></span>
        </button>
        <nav class="nav-menu" id="navMenu">
            <a href="index.html">Титул</a>
            <a href="theory.html">Теория</a>
            <a href="description.html">Описание</a>
            <a href="principle.html" class="active">Принцип работы</a>
            <a href="simulator.html">Симулятор</a>
        </nav>
    </div>
</div>

<div class="content-page">
    <div class="container">
        
        <div class="main-title-sticky">
            <h1 class="page-title">Принцип работы автожира</h1>
        </div>
        
        <section class="sticky-section">
            <div class="section-content">
                <div class="video-panel">
                    <video class="principle-video" controls preload="metadata">
                        <source src="video/autogyro.mp4" type="video/mp4">
                        Ваш браузер не поддерживает воспроизведение видео.
                    </video>
                    <p class="video-caption">Видео-анимация демонстрирует работу автожира и движение основных элементов установки.</p>
                </div>
            </div>
        </section>
        
    </div>
</div>

<script>
function toggleMenu() {
    document.querySelector('.burger-menu').classList.toggle('active');
    document.getElementById('navMenu').classList.toggle('active');
}

document.querySelectorAll('.nav-menu a').forEach(link => {
    link.addEventListener('click', function() {
        document.querySelector('.burger-menu').classList.remove('active');
        document.getElementById('navMenu').classList.remove('active');
    });
});
</script>

</body>
</html>
