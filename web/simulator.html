<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курсовой проект – Симулятор</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="active_dialog.js" defer></script>
</head>
<body onLoad="dialog_window()">

<!-- ФИКСИРОВАННОЕ МЕНЮ -->
<div class="fixed-header">
    <div class="nav-container">
        <div class="site-title">Автожир</div>
        
        <button class="burger-menu" onclick="toggleMenu()" aria-label="Открыть меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <nav class="nav-menu" id="navMenu">
            <a href="index.html">Титул</a>
            <a href="theory.html">Теория</a>
            <a href="description.html">Описание</a>
            <a href="principle.html">Принцип работы</a>
            <a href="simulator.html"  class="active">Симулятор</a>
        </nav>
    </div>
</div>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<div class="content-page">
    <div class="container simulator-container">
        <h1 class="page-title">Симулятор Автожира</h1>

        <div class="unity-simulator">
            <iframe
                class="unity-frame"
                src="web_build/index.html"
                title="Unity-симулятор автожира"
                allow="fullscreen; gamepad; autoplay"
                allowfullscreen>
            </iframe>
            <div class="unity-actions">
                <a href="web_build/index.html" target="_blank" rel="noopener">Открыть симулятор в отдельном окне</a>
            </div>
        </div>

    </div>
</div>
<script>
    function toggleMenu() {
    var burger = document.querySelector('.burger-menu');
    var menu = document.getElementById('navMenu');
    
    burger.classList.toggle('active');
    menu.classList.toggle('active');
}

// Закрытие меню при клике на ссылку (для мобильных)
document.querySelectorAll('.nav-menu a').forEach(function(link) {
    link.addEventListener('click', function() {
        var burger = document.querySelector('.burger-menu');
        var menu = document.getElementById('navMenu');
        burger.classList.remove('active');
        menu.classList.remove('active');
    });
});

// Закрытие меню при клике вне его
document.addEventListener('click', function(e) {
    var header = document.querySelector('.fixed-header');
    var burger = document.querySelector('.burger-menu');
    var menu = document.getElementById('navMenu');
    
    if (!header.contains(e.target)) {
        burger.classList.remove('active');
        menu.classList.remove('active');
    }
});
</script>
</body>
</html>
